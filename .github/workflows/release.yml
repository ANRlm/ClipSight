name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v, for example 0.4.0
        required: true
        type: string
      build_number:
        description: Optional CFBundleVersion. Defaults to the GitHub run number.
        required: false
        type: string

permissions:
  contents: write

jobs:
  notarized-release:
    name: Build Notarized Release
    runs-on: macos-14

    env:
      CLIPSIGHT_BUNDLE_ID: com.anrlm.ClipSight
      NOTARYTOOL_PROFILE: clipsight-release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version input
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must match x.y.z, got: $VERSION" >&2
            exit 2
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "tag v$VERSION already exists" >&2
            exit 2
          fi

      - name: Import Developer ID certificate
        shell: bash
        env:
          CERT_BASE64: ${{ secrets.CLIPSIGHT_DEVELOPER_ID_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CLIPSIGHT_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$CERT_BASE64" || -z "$CERT_PASSWORD" ]]; then
            echo "Developer ID certificate secrets are missing" >&2
            exit 2
          fi

          CERT_PATH="$RUNNER_TEMP/clipsight-developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/clipsight-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$CERT_BASE64" | /usr/bin/base64 -D > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Store notarytool credentials
        shell: bash
        env:
          APPLE_ID: ${{ secrets.CLIPSIGHT_APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.CLIPSIGHT_APPLE_TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.CLIPSIGHT_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$APPLE_ID" || -z "$APPLE_TEAM_ID" || -z "$APP_SPECIFIC_PASSWORD" ]]; then
            echo "Apple notarization secrets are missing" >&2
            exit 2
          fi

          xcrun notarytool store-credentials "$NOTARYTOOL_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APP_SPECIFIC_PASSWORD"

      - name: Run tests
        run: ./script/test.sh

      - name: Build notarized app
        shell: bash
        env:
          CODESIGN_IDENTITY: ${{ vars.CLIPSIGHT_CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail
          if [[ -z "${CODESIGN_IDENTITY:-}" ]]; then
            echo "CLIPSIGHT_CODESIGN_IDENTITY repository variable is missing" >&2
            exit 2
          fi

          VERSION="${{ inputs.version }}"
          BUILD_NUMBER="${{ inputs.build_number }}"
          if [[ -z "$BUILD_NUMBER" ]]; then
            BUILD_NUMBER="$GITHUB_RUN_NUMBER"
          fi

          MARKETING_VERSION="$VERSION" \
          BUILD_NUMBER="$BUILD_NUMBER" \
          ./script/package_app.sh --distribution notarized

      - name: Verify notarized app
        run: script/verify_release.sh --mode notarized

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          ASSET="dist/ClipSight-$VERSION.zip"
          NOTES_FILE="$RUNNER_TEMP/clipsight-release-notes.md"
          cat > "$NOTES_FILE" <<EOF
          ClipSight $VERSION

          This release is signed with Developer ID and notarized by Apple.

          Changes:
          - Official bundle identifier: \`com.anrlm.ClipSight\`
          - Notarized macOS app zip for regular distribution
          - Stability, diagnostics, OCR formatting, and accessibility improvements
          EOF

          git tag -a "v$VERSION" -m "ClipSight $VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" "$ASSET" \
            --repo "$GITHUB_REPOSITORY" \
            --title "ClipSight $VERSION" \
            --notes-file "$NOTES_FILE"
